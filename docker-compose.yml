# docker-compose.yml — activia-trace local development stack
#
# Services:
#   api      — FastAPI application (backend/)
#   postgres — PostgreSQL 16 database
#   worker   — Background worker (same image as api, different command)
#
# Usage:
#   docker-compose up           # start all services
#   docker-compose up api       # start only api (and its dependency postgres)
#   docker-compose down -v      # stop and remove volumes
#
# Environment: copy backend/.env.example to backend/.env and fill in values.

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: activia
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: activia_trace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activia -d activia_trace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # Override DATABASE_URL to use the compose service name
      DATABASE_URL: postgresql+asyncpg://activia:changeme@postgres:5432/activia_trace
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Worker ──────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://activia:changeme@postgres:5432/activia_trace
    command: ["python", "-m", "app.workers.main"]

volumes:
  postgres_data:
    driver: local
