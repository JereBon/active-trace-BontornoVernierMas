# alembic.ini — Alembic configuration for activia-trace backend.
# DATABASE_URL is read from the environment in env.py (overrides sqlalchemy.url).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is overridden by env.py from DATABASE_URL env var.
# Set a placeholder here so Alembic does not error on init.
sqlalchemy.url = postgresql+asyncpg://activia:changeme@localhost:5432/activia_trace

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
